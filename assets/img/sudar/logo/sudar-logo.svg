<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-label="Sudar Hospital">
  <defs>
    <linearGradient id="sudarGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c8ed6"/>
      <stop offset="1" stop-color="#0a4d9c"/>
    </linearGradient>
  </defs>
  <circle cx="48" cy="48" r="46" fill="url(#sudarGrad)"/>
  <circle cx="48" cy="48" r="46" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2"/>
  <!-- heartbeat pulse -->
  <path d="M14 52 H30 l5 -13 l7 26 l6 -34 l6 21 l4 -8 h18"
        fill="none" stroke="#ffffff" stroke-width="3.4"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
  <!-- medical cross -->
  <g fill="#ffffff">
    <rect x="42.5" y="20" width="11" height="34" rx="3"/>
    <rect x="31" y="31.5" width="34" height="11" rx="3"/>
  </g>
</svg>
